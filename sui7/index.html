<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUI7 Admin - Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: { 900: '#0b0f19', 800: '#111827', 700: '#1f2937' },
                        brand: { 500: '#3b82f6', 600: '#2563eb' }
                    }
                }
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body class="text-sm">
    <div id="app" class="min-h-screen text-white">
        <!-- Content dynamically injected here -->
        <div class="min-h-screen flex items-center justify-center p-4">
            <div class="glass-card w-full max-w-md p-8 relative overflow-hidden flex flex-col items-center justify-center fade-in">
                <div class="spinner border-brand-500 mb-4"></div>
                <p class="text-gray-400">Loading System Components...</p>
            </div>
        </div>
    </div>
    <script type="module" src="js/app.js"></script>
</body>
</html>
