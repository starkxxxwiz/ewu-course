<div class="glass-card w-full max-w-md p-8 relative overflow-hidden fade-in mx-auto mt-20 shadow-2xl">
    <div class="absolute -top-20 -right-20 w-40 h-40 bg-brand-500 rounded-full mix-blend-screen filter blur-[50px] opacity-20"></div>
    
    <div class="text-center mb-8 relative z-10">
        <div class="w-16 h-16 mx-auto bg-gradient-to-br from-gray-800 to-gray-900 rounded-2xl flex items-center justify-center mb-4 border border-gray-700 shadow-lg">
            <i class="ph ph-shield-check text-3xl text-brand-500"></i>
        </div>
        <h1 class="text-2xl font-bold tracking-tight text-white mb-1">SUI7 Command Center</h1>
        <p class="text-gray-400 text-sm">Authenticate to manage EWU Course Filter securely.</p>
    </div>
    
    <form id="loginForm" class="space-y-5 relative z-10">
        <div>
            <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1.5">Username</label>
            <div class="relative">
                <i class="ph ph-user absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-lg"></i>
                <input type="text" id="username" class="glass-input w-full rounded-lg py-2.5 pl-10 pr-4" placeholder="admin" required>
            </div>
        </div>
        <div>
            <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1.5">Password</label>
            <div class="relative">
                <i class="ph ph-lock-key absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-lg"></i>
                <input type="password" id="password" class="glass-input w-full rounded-lg py-2.5 pl-10 pr-4" placeholder="••••••••" required>
            </div>
        </div>

        <div id="loginError" class="hidden p-3 rounded-lg bg-red-500/10 border border-red-500/20 text-red-400 text-xs flex items-center gap-2">
            <i class="ph ph-warning-circle text-base min-w-[16px]"></i>
            <span id="loginErrorMsg">Invalid credentials.</span>
        </div>

        <button type="submit" id="loginBtn" class="btn-glow w-full py-2.5 rounded-lg text-white font-medium flex items-center justify-center gap-2 mt-4">
            <span>Authenticating</span>
            <i class="ph ph-arrow-right font-bold transition-transform group-hover:translate-x-1"></i>
        </button>
    </form>
    
    <div class="mt-6 text-center text-xs text-gray-500 flex items-center justify-center gap-1.5 relative z-10">
        <i class="ph ph-lock text-green-400/70"></i>
        End-to-End Encrypted & Brute-Force Protected
    </div>
</div>
