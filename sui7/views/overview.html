<div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8 view-transition-enter">
    <div class="glass-card p-6 flex flex-col justify-between relative overflow-hidden group">
        <div class="absolute -right-4 -top-4 text-blue-500/10 group-hover:text-blue-500/20 transition-colors"><i class="ph ph-users text-8xl"></i></div>
        <div class="relative z-10 text-gray-400 font-medium mb-1 flex items-center gap-2"><i class="ph ph-users text-blue-400"></i> Unique Visitors (7 Days)</div>
        <div class="relative z-10 text-3xl font-bold text-white mt-2" id="ovUniqueVisits">--</div>
    </div>
    
    <div class="glass-card p-6 flex flex-col justify-between relative overflow-hidden group">
        <div class="absolute -right-4 -top-4 text-purple-500/10 group-hover:text-purple-500/20 transition-colors"><i class="ph ph-cursor-click text-8xl"></i></div>
        <div class="relative z-10 text-gray-400 font-medium mb-1 flex items-center gap-2"><i class="ph ph-cursor-click text-purple-400"></i> Total Actions (7 Days)</div>
        <div class="relative z-10 text-3xl font-bold text-white mt-2" id="ovActions">--</div>
    </div>

    <div class="glass-card p-6 flex flex-col justify-between relative overflow-hidden group">
        <div class="absolute -right-4 -top-4 text-red-500/10 group-hover:text-red-500/20 transition-colors"><i class="ph ph-shield-x text-8xl"></i></div>
        <div class="relative z-10 text-gray-400 font-medium mb-1 flex items-center gap-2"><i class="ph ph-shield-slash text-red-400"></i> Blocked Entities</div>
        <div class="relative z-10 text-3xl font-bold text-white mt-2 flex items-baseline gap-2">
            <span id="ovBlocks">--</span>
            <span class="text-xs text-red-400 font-normal">Active blocks</span>
        </div>
    </div>
</div>

<div class="grid grid-cols-1 lg:grid-cols-2 gap-6 view-transition-enter" style="animation-delay: 0.1s;">
    <!-- System Health -->
    <div class="glass-card p-6 flex flex-col">
        <h3 class="text-lg font-semibold text-white flex items-center gap-2 mb-4">
            <i class="ph ph-activity text-green-400"></i> System Status
        </h3>
        <div class="space-y-4">
            <div class="flex items-center justify-between p-4 rounded-lg bg-gray-900/40 border border-gray-800">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-blue-500/10 flex items-center justify-center text-blue-400">
                        <i class="ph ph-globe-hemisphere-west text-xl"></i>
                    </div>
                    <div>
                        <div class="text-sm font-medium text-white">Frontend Gateway</div>
                        <div class="text-xs text-gray-400">Cloudflare Pages</div>
                    </div>
                </div>
                <div class="text-green-400 flex items-center gap-1.5 text-sm font-medium">
                    <i class="ph ph-check-circle"></i> Operational
                </div>
            </div>
            <div class="flex items-center justify-between p-4 rounded-lg bg-gray-900/40 border border-gray-800">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-purple-500/10 flex items-center justify-center text-purple-400">
                        <i class="ph ph-database text-xl"></i>
                    </div>
                    <div>
                        <div class="text-sm font-medium text-white">KV Storage Edge</div>
                        <div class="text-xs text-gray-400">Data persistence state</div>
                    </div>
                </div>
                <div class="text-green-400 flex items-center gap-1.5 text-sm font-medium">
                    <i class="ph ph-check-circle"></i> Connected
                </div>
            </div>
            <div class="flex items-center justify-between p-4 rounded-lg bg-gray-900/40 border border-gray-800">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-orange-500/10 flex items-center justify-center text-orange-400">
                        <i class="ph ph-plugs-connected text-xl"></i>
                    </div>
                    <div>
                        <div class="text-sm font-medium text-white">Target API (EWU Portal)</div>
                        <div class="text-xs text-gray-400">Upstream connection status</div>
                    </div>
                </div>
                <div class="text-green-400 flex items-center gap-1.5 text-sm font-medium">
                    <i class="ph ph-check-circle"></i> Stable
                </div>
            </div>
        </div>
    </div>
    
    <!-- Quick Logs -->
    <div class="glass-card p-0 flex flex-col">
        <div class="p-5 border-b border-gray-800 flex justify-between items-center">
            <h3 class="text-lg font-semibold text-white flex items-center gap-2">
                <i class="ph ph-clock-counter-clockwise text-gray-400"></i> Recent Activity
            </h3>
            <a href="#/security" class="text-xs text-brand-400 hover:text-brand-300">View All</a>
        </div>
        <div class="flex-1 overflow-auto p-2" id="ovLogs">
            <!-- Logs injected here -->
            <div class="p-4 text-center text-gray-500">Loading logs...</div>
        </div>
    </div>
</div>
