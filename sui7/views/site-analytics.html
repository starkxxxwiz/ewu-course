<div class="glass-card p-6 h-[500px] flex flex-col view-transition-enter">
    <div class="flex items-center justify-between mb-6">
        <h3 class="text-lg font-semibold text-white flex items-center gap-2">
            <i class="ph ph-chart-line-up text-brand-500"></i> Traffic & Engagement Over Time
        </h3>
    </div>
    <div class="flex-1 relative">
        <canvas id="trafficChart"></canvas>
    </div>
</div>

<div class="grid grid-cols-1 md:grid-cols-2 gap-6 mt-6 view-transition-enter" style="animation-delay: 0.1s;">
    <div class="glass-card p-6">
        <h3 class="text-lg font-semibold text-white flex items-center gap-2 mb-4">
            <i class="ph ph-trend-up text-green-400"></i> Action Density
        </h3>
        <p class="text-gray-400 text-sm mb-4">Ratio of meaningful actions (fetches/clicks) against unique raw visits.</p>
        <div class="relative h-4 rounded-full bg-gray-800 overflow-hidden">
            <div id="engagementBar" class="absolute top-0 left-0 h-full bg-gradient-to-r from-blue-500 to-purple-500 transition-all duration-1000 w-0"></div>
        </div>
        <div class="mt-2 flex justify-between text-xs text-gray-500">
            <span>Visits</span>
            <span id="engagementText">0% Conversion</span>
            <span>Actions</span>
        </div>
    </div>
</div>
